<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Commitments - Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Abstract Background -->
    <div class="mesh-bg">
        <div class="blob1"></div>
        <div class="blob2"></div>
    </div>

    <!-- App Container -->
    <main class="app-glass-container">

        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <span class="icon">◎</span>
                <h2>Family Ledger</h2>
            </div>

            <nav class="side-nav">
                <a href="#" class="nav-item active">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                    History
                </a>
                <a href="#" class="nav-item">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 8v4l3 3"></path>
                    </svg>
                    Trash
                </a>
            </nav>

            <div class="user-profile">
                <div class="avatar">AF</div>
                <div class="user-info">
                    <span class="name">Addey</span>
                    <span class="role">Admin</span>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <section class="content-area">

            <!-- Header -->
            <header class="top-bar">
                <div class="greeting">
                    <h1>Active Overview</h1>
                    <p>Good evening! Here is your financial outline for March 2026.</p>
                </div>
                <div class="actions">
                    <button class="btn btn-outline">Share Ledger</button>
                    <button class="btn btn-primary">+ Add New Item</button>
                </div>
            </header>

            <!-- Quick Stats Cards -->
            <div class="stats-grid">
                <div class="glass-card stat-card">
                    <div class="stat-icon pending-icon"></div>
                    <div class="stat-data">
                        <span class="label">Total Pending</span>
                        <h3>RM 2,450.00</h3>
                    </div>
                </div>
                <div class="glass-card stat-card">
                    <div class="stat-icon paid-icon"></div>
                    <div class="stat-data">
                        <span class="label">Total Paid</span>
                        <h3>RM 1,200.00</h3>
                    </div>
                </div>
                <!-- Mini Progress Chart -->
                <div class="glass-card progress-card">
                    <div class="progress-info">
                        <span class="label">Completion</span>
                        <h3 class="percent">34%</h3>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: 34%;"></div>
                    </div>
                </div>
            </div>

            <!-- Ledger List -->
            <div class="ledger-container">
                <h3 class="section-title">March 2026 Commitments</h3>

                <div class="glass-card table-wrapper" id="ledger-list-container">
                    <!-- Populated by main.js -->
                </div>
            </div>

        </section>
    </main>

    <script src="main.js"></script>
</body>

</html>
